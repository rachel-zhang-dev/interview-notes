<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>高级后端工程师面试题 · NestJS / Composable Commerce</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-soft: #172033;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #60a5fa;
      --accent-strong: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --purple: #a78bfa;
      --pink: #f472b6;
      --tag-bg: #334155;
      --code-bg: #0b1220;
      --shadow: 0 4px 12px rgba(0,0,0,.35);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      line-height: 1.7;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 顶部 Header（仅页面顶部，不固定） ===== */
    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
    }
    /* sticky 工具条：分类 + 搜索 */
    .toolbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(15,23,42,.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px 8px;
    }
    .header h1 {
      font-size: 17px; color: var(--accent); margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      line-height: 1.3;
    }
    .header h1 .badge {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
      background: var(--accent-strong); color: #fff; font-weight: 600;
      white-space: nowrap;
    }
    .header p { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }

    .stats {
      display: flex; gap: 8px; margin-bottom: 10px;
      font-size: 12px;
    }
    .stat {
      flex: 1; background: var(--panel-soft); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 8px; text-align: center;
    }
    .stat-num { font-size: 16px; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-muted); font-size: 11px; }
    .stat.done .stat-num { color: var(--success); }
    .stat.review .stat-num { color: var(--warning); }

    .search {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--panel-soft);
      color: var(--text); font-size: 14px; outline: none;
    }
    .search:focus { border-color: var(--accent); }

    /* ===== 分类标签 ===== */
    .categories {
      display: flex; gap: 6px; overflow-x: auto;
      margin-top: 8px; padding-bottom: 2px;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0; padding: 6px 12px; border-radius: 999px;
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 12px; cursor: pointer;
      transition: all .15s ease;
    }
    .cat-btn.active {
      background: var(--accent-strong); border-color: var(--accent-strong);
      color: #fff; font-weight: 600;
    }
    .cat-btn .count {
      display: inline-block; margin-left: 4px; opacity: .7; font-size: 11px;
    }

    /* ===== 题目列表 ===== */
    main {
      max-width: 800px; margin: 0 auto;
      padding: 16px 12px 80px;
    }

    .group-title {
      font-size: 13px; color: var(--accent); margin: 22px 4px 10px;
      letter-spacing: .5px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .group-title::before {
      content: ""; width: 3px; height: 14px; background: var(--accent);
      border-radius: 2px;
    }

    .qcard {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color .15s ease;
    }
    .qcard.expanded { border-color: var(--accent-strong); }
    .qcard.done { opacity: .55; }
    .qcard.done .q-head { background: rgba(16,185,129,.05); }

    .q-head {
      padding: 12px 14px; cursor: pointer; user-select: none;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .q-num {
      flex-shrink: 0; width: 26px; height: 26px; line-height: 26px;
      text-align: center; border-radius: 6px; background: var(--panel-soft);
      color: var(--text-muted); font-size: 12px; font-weight: 600;
    }
    .q-title-wrap { flex: 1; min-width: 0; }
    .q-title {
      font-size: 14.5px; font-weight: 500; line-height: 1.55;
      color: var(--text);
    }
    .q-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
    .tag {
      font-size: 10px; padding: 2px 7px; border-radius: 4px;
      background: var(--tag-bg); color: var(--text-muted);
    }
    .tag.must { background: rgba(239,68,68,.18); color: #fca5a5; }
    .tag.nice { background: rgba(167,139,250,.18); color: var(--purple); }
    .tag.hot  { background: rgba(245,158,11,.18); color: var(--warning); }
    .tag.code { background: rgba(96,165,250,.18); color: var(--accent); }

    .q-icon {
      flex-shrink: 0; color: var(--text-dim); font-size: 12px;
      transition: transform .2s ease; padding-top: 4px;
    }
    .qcard.expanded .q-icon { transform: rotate(90deg); color: var(--accent); }

    .q-body {
      display: none; padding: 0 14px 14px;
      border-top: 1px solid var(--border);
      margin-top: 2px;
      animation: slide .2s ease;
    }
    .qcard.expanded .q-body { display: block; }
    @keyframes slide {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ans-block { margin-top: 12px; }
    .ans-label {
      font-size: 12px; color: var(--accent); font-weight: 600;
      margin-bottom: 6px; letter-spacing: .3px;
    }
    .ans-label.bonus { color: var(--warning); }
    .ans-label.pitfall { color: var(--danger); }

    .ans-content {
      font-size: 13.5px; color: var(--text); line-height: 1.75;
    }
    .ans-content ul, .ans-content ol {
      padding-left: 20px; margin: 4px 0;
    }
    .ans-content li { margin-bottom: 3px; }
    .ans-content p { margin: 4px 0; }
    .ans-content strong { color: var(--accent); font-weight: 600; }
    .ans-content code {
      background: var(--code-bg); color: #fbbf24;
      padding: 1px 5px; border-radius: 3px;
      font-family: "SF Mono", Menlo, monospace; font-size: 12.5px;
    }
    .ans-content pre {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px; margin: 6px 0;
      overflow-x: auto; font-size: 12px; line-height: 1.55;
    }
    .ans-content pre code { background: none; padding: 0; color: #e2e8f0; }

    .action-row {
      display: flex; gap: 8px; margin-top: 14px;
      padding-top: 12px; border-top: 1px dashed var(--border);
    }
    .action-btn {
      flex: 1; padding: 7px; border-radius: 6px;
      background: var(--panel-soft); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 12px; cursor: pointer;
      transition: all .15s ease;
    }
    .action-btn:hover { color: var(--text); border-color: var(--accent); }
    .action-btn.done { color: var(--success); border-color: rgba(16,185,129,.4); }
    .action-btn.review { color: var(--warning); border-color: rgba(245,158,11,.4); }

    .empty {
      text-align: center; padding: 40px 20px; color: var(--text-muted);
      font-size: 14px;
    }

    /* ===== 回到顶部 ===== */
    .top-btn {
      position: fixed; right: 16px; bottom: 16px;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-strong); color: #fff;
      border: none; cursor: pointer;
      box-shadow: var(--shadow); font-size: 18px;
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .top-btn.show { display: flex; }

    /* ===== 桌面端优化 ===== */
    @media (min-width: 768px) {
      main { padding: 24px; }
      .header { padding: 18px 24px 14px; }
      .header h1 { font-size: 20px; }
      .categories { top: 140px; padding: 12px 24px; }
      .q-title { font-size: 15px; }
      .ans-content { font-size: 14px; }
    }
  </style>
</head>
<body>

<header class="header">
  <h1>高级后端工程师面试题 <span class="badge">NestJS · Composable Commerce</span></h1>
  <p>电商 / 旅游分销 · Azure AD B2C · Commercetools · SynXis</p>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-num">0</div><div class="stat-label">总题数</div></div>
    <div class="stat done"><div class="stat-num" id="done-num">0</div><div class="stat-label">已掌握</div></div>
    <div class="stat review"><div class="stat-num" id="review-num">0</div><div class="stat-label">需复习</div></div>
  </div>
</header>

<div class="toolbar">
  <input class="search" id="search" placeholder="🔍 搜索题目或关键词" />
  <nav class="categories" id="categories"></nav>
</div>

<main id="content"></main>

<button class="top-btn" id="topBtn" title="回到顶部">↑</button>

<script>
/* ============================================================
   面试题数据
   每题字段：
   - cat: 分类
   - q: 题目
   - tags: 标签 ['must'|'nice'|'hot'|'code']
   - core: 核心要点（简答）
   - detail: 详细展开（支持 HTML）
   - bonus: 加分回答（可选）
   - pitfall: 容易踩坑的点（可选）
============================================================ */
const QUESTIONS = [
  /* ============ A. NestJS 核心 ============ */
  {
    cat: 'A. NestJS 核心',
    q: 'NestJS 的依赖注入是怎么实现的？和 Spring IoC 有什么异同？',
    tags: ['must','hot'],
    core: 'NestJS 利用 TypeScript 装饰器 + reflect-metadata，在运行时通过构造函数参数的元数据完成自动注入。容器（IoC Container）按 Module 维度组织 Provider，单例为默认作用域。',
    detail: `
      <ul>
        <li><strong>原理</strong>：<code>@Injectable()</code> 注册元数据，<code>tsconfig</code> 开启 <code>emitDecoratorMetadata</code>，编译器把构造参数类型写入 <code>design:paramtypes</code>，框架运行时读取后从容器找实例。</li>
        <li><strong>三种作用域</strong>：<code>DEFAULT</code>（单例，进程级）、<code>REQUEST</code>（每请求一个实例，可注入 Request）、<code>TRANSIENT</code>（每次注入新建）。</li>
        <li><strong>四种 Provider 写法</strong>：<code>useClass</code> / <code>useValue</code>（常量、Mock）/ <code>useFactory</code>（异步动态创建，常用于配置）/ <code>useExisting</code>（别名）。</li>
        <li><strong>与 Spring 对比</strong>：理念一致（IoC + DI），都是构造函数注入为主；NestJS 借助 TS 装饰器，编译期完成元数据收集，无运行时反射 ClassPath；Spring 多了 AOP / Bean 生命周期更丰富。</li>
      </ul>
      <pre><code>@Injectable({ scope: Scope.REQUEST })
export class TenantContext {
  constructor(@Inject(REQUEST) private req: Request) {}
  get tenantId() { return this.req.headers['x-tenant-id']; }
}</code></pre>
    `,
    bonus: '能说出 <code>REQUEST scope</code> 会让整条注入链都变成 REQUEST 作用域，导致性能下降，因此核心服务应避免。'
  },
  {
    cat: 'A. NestJS 核心',
    q: 'Module、Provider、Controller 三者关系？为什么强调模块化？',
    tags: ['must'],
    core: 'Module 是封装边界，Controller 处理 HTTP/RPC 入口，Provider 是可注入的服务/工厂。模块化便于按业务域隔离、按需懒加载、便于复用与测试。',
    detail: `
      <ul>
        <li><strong>Feature Module</strong>：按业务域（订单、用户、酒店）拆分，便于 monorepo / 微服务化。</li>
        <li><strong>Shared Module</strong>：共享 Provider（如 LoggerModule），<code>exports</code> 后才能被其他 Module 使用。</li>
        <li><strong>Dynamic Module</strong>：<code>forRoot()</code> / <code>forRootAsync()</code> 注入配置，例如 <code>ConfigModule.forRoot({ load: [config] })</code>。</li>
        <li><strong>Global Module</strong>：<code>@Global()</code> 让导出的 Provider 全局可用（慎用，破坏显式依赖）。</li>
      </ul>
    `,
    bonus: '在大型电商项目，常按 <strong>DDD 限界上下文</strong> 拆 Module，每个 Module 独立 entity、service、controller，方便后续抽出独立微服务。'
  },
  {
    cat: 'A. NestJS 核心',
    q: 'Guard / Interceptor / Pipe / Middleware / ExceptionFilter 的执行顺序和适用场景？',
    tags: ['must','hot'],
    core: 'Middleware → Guard → Interceptor(前) → Pipe → Handler → Interceptor(后) → ExceptionFilter（任意阶段抛错都会进入）。',
    detail: `
      <ol>
        <li><strong>Middleware</strong>：Express/Fastify 层，跨切面但拿不到 NestJS DI 完整能力（早于 Guard 运行）。日志、HTTP 请求 ID。</li>
        <li><strong>Guard</strong>：鉴权 / 权限判断，返回 <code>boolean</code> 或抛 <code>ForbiddenException</code>。<code>@UseGuards(AuthGuard, RolesGuard)</code></li>
        <li><strong>Interceptor</strong>：横切前后逻辑（日志、缓存、转换响应、超时、追踪）。基于 RxJS。</li>
        <li><strong>Pipe</strong>：参数校验 / 转换（class-validator + class-transformer）。</li>
        <li><strong>ExceptionFilter</strong>：统一错误响应、自定义错误码映射。</li>
      </ol>
      <pre><code>// 全局统一响应包装
@Injectable()
export class TransformInterceptor&lt;T&gt; implements NestInterceptor&lt;T, Resp&lt;T&gt;&gt; {
  intercept(ctx: ExecutionContext, next: CallHandler) {
    return next.handle().pipe(map(data =&gt; ({ code: 0, data, ts: Date.now() })));
  }
}</code></pre>
    `,
    pitfall: 'Guard 抛出的异常会被 ExceptionFilter 捕获，但 Middleware 内部 throw 不会进 Nest 的 Filter，需要手动 next(err)。'
  },
  {
    cat: 'A. NestJS 核心',
    q: '如何实现一个基于 Azure AD B2C 的 JWT AuthGuard？',
    tags: ['must','code','hot'],
    core: '用 passport-jwt + jwks-rsa 动态从 B2C 的 OpenID metadata 拉公钥，Guard 内校验 <code>iss</code> / <code>aud</code> / <code>exp</code>，把 user 挂到 request 上。',
    detail: `
      <pre><code>import { Strategy, ExtractJwt } from 'passport-jwt';
import { PassportStrategy } from '@nestjs/passport';
import * as jwksRsa from 'jwks-rsa';

@Injectable()
export class B2cJwtStrategy extends PassportStrategy(Strategy, 'b2c') {
  constructor(cfg: ConfigService) {
    super({
      jwtFromRequest: ExtractJwt.fromAuthHeaderAsBearerToken(),
      issuer: cfg.get('B2C_ISSUER'),       // https://{tenant}.b2clogin.com/{tenantId}/v2.0/
      audience: cfg.get('B2C_CLIENT_ID'),
      algorithms: ['RS256'],
      secretOrKeyProvider: jwksRsa.passportJwtSecret({
        jwksUri: cfg.get('B2C_JWKS_URI'),  // .../discovery/v2.0/keys
        cache: true, rateLimit: true,
      }),
    });
  }
  async validate(payload: any) {
    return { sub: payload.sub, email: payload.emails?.[0], tenantId: payload.extension_tenantId };
  }
}

@Injectable()
export class B2cAuthGuard extends AuthGuard('b2c') {}</code></pre>
    `,
    bonus: '在生产场景：①缓存 JWKS（jwks-rsa 自带）；②引入 <strong>多 policy 支持</strong>（signin / signup / password reset 各对应不同 issuer，需要支持多 strategy 或在 validate 内分流）；③记录 <code>oid</code> + <code>tid</code> 用于审计。'
  },
  {
    cat: 'A. NestJS 核心',
    q: '自定义参数装饰器（如 @CurrentUser）怎么实现？',
    tags: ['code'],
    core: '用 <code>createParamDecorator</code> 从 <code>ExecutionContext</code> 取 request 上的属性。',
    detail: `
      <pre><code>export const CurrentUser = createParamDecorator(
  (data: keyof User | undefined, ctx: ExecutionContext) =&gt; {
    const req = ctx.switchToHttp().getRequest();
    return data ? req.user?.[data] : req.user;
  },
);

@Get('me')
@UseGuards(B2cAuthGuard)
profile(@CurrentUser() user: User) { return user; }</code></pre>
    `,
    bonus: '可结合 <code>SetMetadata</code> + Reflector 实现 <code>@Roles(\'admin\')</code> 这样的元数据驱动鉴权。'
  },
  {
    cat: 'A. NestJS 核心',
    q: '全局 ValidationPipe 的工作原理？class-validator 是怎么校验 DTO 的？',
    tags: ['must'],
    core: 'ValidationPipe 拿到目标类型 metatype，用 class-transformer plainToInstance 转对象，再调用 class-validator 的 validate 检查装饰器约束，失败抛 BadRequestException。',
    detail: `
      <ul>
        <li>开启 <code>whitelist: true</code> 自动剔除未声明字段，<code>forbidNonWhitelisted: true</code> 直接报错。</li>
        <li>开启 <code>transform: true</code> 后字符串可自动转 number / boolean / Date。</li>
        <li>嵌套校验需 <code>@ValidateNested()</code> + <code>@Type(() =&gt; ChildDto)</code>。</li>
        <li>异步规则用 <code>@ValidateBy</code> 或自定义 <code>ValidatorConstraint</code>，比如校验 SKU 是否存在。</li>
      </ul>
      <pre><code>app.useGlobalPipes(new ValidationPipe({
  whitelist: true, forbidNonWhitelisted: true,
  transform: true, transformOptions: { enableImplicitConversion: true },
}));</code></pre>
    `,
    pitfall: 'GraphQL / Microservice context 默认不走 HTTP pipeline，需要单独配置全局 Pipe。'
  },
  {
    cat: 'A. NestJS 核心',
    q: 'NestJS 微服务（@nestjs/microservices）有哪些 transport，如何选择？',
    tags: ['must'],
    core: '内置 TCP / Redis / NATS / MQTT / Kafka / RabbitMQ / gRPC。选择按通信语义：低延迟点对点 → gRPC；事件驱动 → Kafka；任务队列 → RabbitMQ；轻量发布订阅 → Redis/NATS。',
    detail: `
      <ul>
        <li><strong>Kafka</strong>：高吞吐、消息持久化、可重放；适合订单事件、库存变更广播。</li>
        <li><strong>RabbitMQ</strong>：路由灵活（exchange/binding）、确认机制成熟；适合需要 DLQ、延时队列的业务。</li>
        <li><strong>gRPC</strong>：强类型 contract、HTTP/2 多路复用；适合内部 service-to-service 调用。</li>
        <li><strong>Pattern</strong>：<code>@MessagePattern</code> 请求-响应（RPC 风格）；<code>@EventPattern</code> 单向事件。</li>
      </ul>
    `,
    bonus: '组合式商务（Composable）场景常用 Kafka + outbox pattern，确保 DB 写入与消息发布原子性。'
  },
  {
    cat: 'A. NestJS 核心',
    q: 'forwardRef 解决什么问题？什么场景下用？',
    tags: ['nice'],
    core: '循环依赖。两个 Provider/Module 互相引用时，借助 forwardRef 让框架延迟解析。',
    detail: `
      <pre><code>@Injectable()
class A {
  constructor(@Inject(forwardRef(() =&gt; B)) private b: B) {}
}</code></pre>
      <p>更推荐的做法：<strong>抽出公共依赖到第三方 Module</strong>、或者使用事件解耦（EventEmitter2 / Kafka），避免 forwardRef 的滥用。</p>
    `,
    pitfall: 'forwardRef 不能解决初始化时序问题（生命周期钩子里访问对方还是会有时序坑），优先考虑重构。'
  },
  {
    cat: 'A. NestJS 核心',
    q: '统一异常处理：如何让所有错误返回统一结构？',
    tags: ['hot','code'],
    core: '实现 ExceptionFilter，结合自定义 BusinessException + i18n + 日志/链路 ID 输出。',
    detail: `
      <pre><code>@Catch()
export class AllExceptionsFilter implements ExceptionFilter {
  catch(ex: unknown, host: ArgumentsHost) {
    const ctx = host.switchToHttp();
    const req = ctx.getRequest&lt;Request&gt;();
    const res = ctx.getResponse&lt;Response&gt;();
    const status = ex instanceof HttpException ? ex.getStatus() : 500;
    const payload = ex instanceof HttpException ? ex.getResponse() : { message: 'Internal Error' };
    const traceId = req.headers['x-trace-id'];
    this.logger.error({ traceId, ex });
    res.status(status).json({
      code: ex?.code ?? status,
      message: typeof payload === 'string' ? payload : payload['message'],
      traceId, ts: Date.now(),
    });
  }

/* ============================================================
   渲染
============================================================ */
const STORAGE_KEY = 'nestjs-iv-progress-v1';
const progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); // { idx: 'done'|'review' }

const tagLabel = { must: '必考', nice: '加分', hot: '热门', code: '手写' };

function categoriesList() {
  const map = new Map();
  QUESTIONS.forEach(q => map.set(q.cat, (map.get(q.cat) || 0) + 1));
  return Array.from(map.entries());
}

let activeCat = 'all';
let keyword = '';

function render() {
  const cats = categoriesList();
  const total = QUESTIONS.length;
  const doneCount = Object.values(progress).filter(v => v === 'done').length;
  const reviewCount = Object.values(progress).filter(v => v === 'review').length;
  document.getElementById('total-num').textContent = total;
  document.getElementById('done-num').textContent = doneCount;
  document.getElementById('review-num').textContent = reviewCount;

  const navEl = document.getElementById('categories');
  navEl.innerHTML = '';
  const allBtn = createCatBtn('all', '全部', total);
  navEl.appendChild(allBtn);
  cats.forEach(([cat, count]) => navEl.appendChild(createCatBtn(cat, cat, count)));

  const filtered = QUESTIONS
    .map((q, i) => ({ ...q, idx: i }))
    .filter(q => (activeCat === 'all' || q.cat === activeCat))
    .filter(q => {
      if (!keyword) return true;
      const k = keyword.toLowerCase();
      return q.q.toLowerCase().includes(k)
        || q.cat.toLowerCase().includes(k)
        || (q.core || '').toLowerCase().includes(k)
        || (q.detail || '').toLowerCase().includes(k);
    });

  const content = document.getElementById('content');
  content.innerHTML = '';

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty">没有匹配的题目，换个关键词试试 🔍</div>';
    return;
  }

  let currentGroup = '';
  filtered.forEach((q, displayIdx) => {
    if (q.cat !== currentGroup) {
      currentGroup = q.cat;
      const title = document.createElement('div');
      title.className = 'group-title';
      title.textContent = q.cat;
      content.appendChild(title);
    }
    content.appendChild(buildCard(q));
  });
}

function createCatBtn(key, label, count) {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (activeCat === key ? ' active' : '');
  btn.innerHTML = label + '<span class="count">' + count + '</span>';
  btn.onclick = () => { activeCat = key; render(); window.scrollTo({top: 0, behavior:'smooth'}); };
  return btn;
}

function buildCard(q) {
  const card = document.createElement('div');
  const state = progress[q.idx];
  card.className = 'qcard' + (state === 'done' ? ' done' : '');

  const tagsHtml = (q.tags || []).map(t =>
    `<span class="tag ${t}">${tagLabel[t] || t}</span>`).join('');

  card.innerHTML = `
    <div class="q-head">
      <div class="q-num">${String(q.idx + 1).padStart(2, '0')}</div>
      <div class="q-title-wrap">
        <div class="q-title">${q.q}</div>
        <div class="q-tags">${tagsHtml}</div>
      </div>
      <div class="q-icon">▸</div>
    </div>
    <div class="q-body">
      ${q.core ? `<div class="ans-block">
        <div class="ans-label">💡 核心要点</div>
        <div class="ans-content">${q.core}</div>
      </div>` : ''}
      ${q.detail ? `<div class="ans-block">
        <div class="ans-label">📖 详细展开</div>
        <div class="ans-content">${q.detail}</div>
      </div>` : ''}
      ${q.bonus ? `<div class="ans-block">
        <div class="ans-label bonus">⭐ 加分回答</div>
        <div class="ans-content">${q.bonus}</div>
      </div>` : ''}
      ${q.pitfall ? `<div class="ans-block">
        <div class="ans-label pitfall">⚠️ 容易踩坑</div>
        <div class="ans-content">${q.pitfall}</div>
      </div>` : ''}
      <div class="action-row">
        <button class="action-btn ${state === 'done' ? 'done' : ''}" data-action="done" data-idx="${q.idx}">
          ${state === 'done' ? '✓ 已掌握' : '标记已掌握'}
        </button>
        <button class="action-btn ${state === 'review' ? 'review' : ''}" data-action="review" data-idx="${q.idx}">
          ${state === 'review' ? '◷ 待复习' : '标记待复习'}
        </button>
        <button class="action-btn" data-action="reset" data-idx="${q.idx}">清除</button>
      </div>
    </div>
  `;

  card.querySelector('.q-head').onclick = () => card.classList.toggle('expanded');

  card.querySelectorAll('.action-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const idx = btn.dataset.idx;
      const action = btn.dataset.action;
      if (action === 'reset') delete progress[idx];
      else progress[idx] = action;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      render();
    };
  });

  return card;
}

document.getElementById('search').addEventListener('input', e => {
  keyword = e.target.value.trim();
  render();
});

const topBtn = document.getElementById('topBtn');
window.addEventListener('scroll', () => {
  topBtn.classList.toggle('show', window.scrollY > 400);
});
topBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

render();
</script>
</body>
</html>
