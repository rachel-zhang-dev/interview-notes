<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>AI 工程师面试题 · RELX / LexisNexis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #475569;
      --text-dim: #94a3b8;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
      --purple: #7c3aed;
      --pink: #db2777;
      --teal: #0d9488;
      --tag-bg: #f1f5f9;
      --code-bg: #f8fafc;
      --code-text: #0f172a;
      --code-key: #b45309;
      --shadow: 0 2px 8px rgba(15,23,42,.06);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      line-height: 1.7;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
    }
    .toolbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px 8px;
    }
    .header h1 {
      font-size: 17px; color: var(--accent); margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      line-height: 1.3;
    }
    .header h1 .badge {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
      background: var(--accent-strong); color: #fff; font-weight: 600;
      white-space: nowrap;
    }
    .header p { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }

    .stats {
      display: flex; gap: 8px; margin-bottom: 10px;
      font-size: 12px;
    }
    .stat {
      flex: 1; background: var(--panel-soft); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 8px; text-align: center;
      box-shadow: 0 1px 2px rgba(15,23,42,.03);
    }
    .stat-num { font-size: 16px; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-muted); font-size: 11px; }
    .stat.done .stat-num { color: var(--success); }
    .stat.review .stat-num { color: var(--warning); }

    .search {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--panel-soft);
      color: var(--text); font-size: 14px; outline: none;
    }
    .search:focus { border-color: var(--accent); }

    .categories {
      display: flex; gap: 6px; overflow-x: auto;
      margin-top: 8px; padding-bottom: 2px;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0; padding: 6px 12px; border-radius: 999px;
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 12px; cursor: pointer;
      transition: all .15s ease;
    }
    .cat-btn.active {
      background: var(--accent-strong); border-color: var(--accent-strong);
      color: #fff; font-weight: 600;
    }
    .cat-btn .count {
      display: inline-block; margin-left: 4px; opacity: .7; font-size: 11px;
    }

    main {
      max-width: 800px; margin: 0 auto;
      padding: 16px 12px 80px;
    }

    .group-title {
      font-size: 13px; color: var(--accent); margin: 22px 4px 10px;
      letter-spacing: .5px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .group-title::before {
      content: ""; width: 3px; height: 14px; background: var(--accent);
      border-radius: 2px;
    }
    .group-title.en::before { background: var(--teal); }
    .group-title.en { color: var(--teal); }

    .qcard {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color .15s ease, box-shadow .15s ease;
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
    }
    .qcard.expanded {
      border-color: var(--accent-strong);
      box-shadow: 0 4px 12px rgba(37,99,235,.08);
    }
    .qcard.done { opacity: .6; }
    .qcard.done .q-head { background: rgba(5,150,105,.06); }

    .q-head {
      padding: 12px 14px; cursor: pointer; user-select: none;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .q-num {
      flex-shrink: 0; width: 26px; height: 26px; line-height: 26px;
      text-align: center; border-radius: 6px;
      background: var(--panel-soft); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 12px; font-weight: 600;
    }
    .q-title-wrap { flex: 1; min-width: 0; }
    .q-title {
      font-size: 14.5px; font-weight: 500; line-height: 1.55;
      color: var(--text);
    }
    .q-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
    .tag {
      font-size: 10px; padding: 2px 7px; border-radius: 4px;
      background: var(--tag-bg); color: var(--text-muted);
    }
    .tag.must { background: rgba(220,38,38,.10); color: var(--danger); }
    .tag.nice { background: rgba(124,58,237,.10); color: var(--purple); }
    .tag.hot  { background: rgba(217,119,6,.12);  color: var(--warning); }
    .tag.code { background: rgba(37,99,235,.10);  color: var(--accent); }
    .tag.en   { background: rgba(13,148,136,.10); color: var(--teal); }

    .q-icon {
      flex-shrink: 0; color: var(--text-dim); font-size: 12px;
      transition: transform .2s ease; padding-top: 4px;
    }
    .qcard.expanded .q-icon { transform: rotate(90deg); color: var(--accent); }

    .q-body {
      display: none; padding: 0 14px 14px;
      border-top: 1px solid var(--border);
      margin-top: 2px;
      animation: slide .2s ease;
    }
    .qcard.expanded .q-body { display: block; }
    @keyframes slide {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ans-block { margin-top: 12px; }
    .ans-label {
      font-size: 12px; color: var(--accent); font-weight: 600;
      margin-bottom: 6px; letter-spacing: .3px;
    }
    .ans-label.bonus { color: var(--warning); }
    .ans-label.pitfall { color: var(--danger); }
    .ans-label.en { color: var(--teal); }

    .ans-content {
      font-size: 13.5px; color: var(--text); line-height: 1.75;
    }
    .ans-content ul, .ans-content ol {
      padding-left: 20px; margin: 4px 0;
    }
    .ans-content li { margin-bottom: 3px; }
    .ans-content p { margin: 4px 0; }
    .ans-content strong { color: var(--accent); font-weight: 600; }
    .ans-content em { color: var(--teal); font-style: normal; font-weight: 500; }
    .ans-content code {
      background: var(--code-bg); color: var(--code-key);
      padding: 1px 5px; border-radius: 3px;
      font-family: "SF Mono", Menlo, monospace; font-size: 12.5px;
      border: 1px solid var(--border);
    }
    .ans-content pre {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px; margin: 6px 0;
      overflow-x: auto; font-size: 12px; line-height: 1.55;
    }
    .ans-content pre code {
      background: none; padding: 0; color: var(--code-text); border: none;
    }
    .ans-content blockquote {
      border-left: 3px solid var(--teal);
      padding: 8px 12px; margin: 8px 0;
      color: var(--text); font-size: 13px;
      background: rgba(13,148,136,.05);
      border-radius: 0 6px 6px 0;
    }
    .ans-content table {
      border-collapse: collapse; width: 100%;
    }
    .ans-content table td,
    .ans-content table th {
      border: 1px solid var(--border); padding: 6px 8px;
    }

    .action-row {
      display: flex; gap: 8px; margin-top: 14px;
      padding-top: 12px; border-top: 1px dashed var(--border);
    }
    .action-btn {
      flex: 1; padding: 7px; border-radius: 6px;
      background: var(--panel-soft); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 12px; cursor: pointer;
      transition: all .15s ease;
    }
    .action-btn:hover { color: var(--text); border-color: var(--accent); }
    .action-btn.done { color: var(--success); border-color: rgba(16,185,129,.4); }
    .action-btn.review { color: var(--warning); border-color: rgba(245,158,11,.4); }

    .empty {
      text-align: center; padding: 48px 20px; color: var(--text-muted);
      font-size: 14px; line-height: 1.8;
    }
    .empty .empty-title {
      font-size: 15px; color: var(--text); margin-bottom: 8px; font-weight: 500;
    }
    .empty .empty-hint {
      font-size: 13px; color: var(--text-dim); margin-bottom: 16px;
    }
    .empty .clear-search-btn {
      padding: 8px 18px; border-radius: 8px;
      background: var(--accent-strong); color: #fff;
      border: none; cursor: pointer; font-size: 13.5px;
      transition: opacity .15s ease;
    }
    .empty .clear-search-btn:hover { opacity: .85; }

    .top-btn {
      position: fixed; right: 16px; bottom: 16px;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-strong); color: #fff;
      border: none; cursor: pointer;
      box-shadow: var(--shadow); font-size: 18px;
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .top-btn.show { display: flex; }

    /* ===== 平板端(768px+) ===== */
    @media (min-width: 768px) {
      html, body { font-size: 16px; line-height: 1.75; }
      main { max-width: 900px; padding: 28px 28px 100px; }
      .header { padding: 22px 28px 16px; }
      .header h1 { font-size: 24px; gap: 10px; }
      .header h1 .badge { font-size: 12px; padding: 3px 9px; }
      .header p { font-size: 14px; margin-bottom: 14px; }
      .stats { gap: 12px; margin-bottom: 14px; }
      .stat { padding: 10px 12px; }
      .stat-num { font-size: 22px; }
      .stat-label { font-size: 13px; }
      .search { padding: 11px 14px; font-size: 15px; }
      .toolbar { padding: 14px 28px 10px; }
      .categories { gap: 8px; margin-top: 12px; }
      .cat-btn { padding: 8px 16px; font-size: 13.5px; }
      .cat-btn .count { font-size: 12px; }
      .group-title { font-size: 16px; margin: 28px 4px 14px; }
      .group-title::before { width: 4px; height: 18px; }
      .qcard { border-radius: 14px; margin-bottom: 14px; }
      .q-head { padding: 16px 18px; gap: 14px; }
      .q-num { width: 32px; height: 32px; line-height: 32px; font-size: 13.5px; }
      .q-title { font-size: 16.5px; line-height: 1.6; }
      .q-tags { gap: 6px; margin-top: 8px; }
      .tag { font-size: 11.5px; padding: 3px 9px; }
      .q-icon { font-size: 14px; padding-top: 6px; }
      .q-body { padding: 0 18px 18px; }
      .ans-block { margin-top: 16px; }
      .ans-label { font-size: 14px; margin-bottom: 8px; }
      .ans-content { font-size: 15px; line-height: 1.85; }
      .ans-content ul, .ans-content ol { padding-left: 24px; }
      .ans-content li { margin-bottom: 5px; }
      .ans-content code { font-size: 13.5px; padding: 2px 6px; }
      .ans-content pre { padding: 14px 16px; font-size: 13.5px; line-height: 1.7; }
      .ans-content blockquote { padding: 12px 16px; font-size: 14.5px; line-height: 1.85; }
      .ans-content table td,
      .ans-content table th { padding: 8px 12px; font-size: 13.5px; }
      .action-row { gap: 10px; margin-top: 18px; padding-top: 14px; }
      .action-btn { padding: 9px; font-size: 13.5px; }
      .top-btn { width: 48px; height: 48px; right: 24px; bottom: 24px; font-size: 20px; }
    }

    /* ===== 桌面端(1100px+) ===== */
    @media (min-width: 1100px) {
      main { max-width: 1000px; padding: 36px 36px 120px; }
      .header { padding: 28px 36px 20px; }
      .header h1 { font-size: 28px; }
      .header p { font-size: 15px; }
      .stats { gap: 14px; }
      .stat-num { font-size: 26px; }
      .stat-label { font-size: 13.5px; }
      .toolbar { padding: 16px 36px 12px; }
      .q-title { font-size: 17.5px; }
      .ans-content { font-size: 15.5px; line-height: 1.9; }
      .ans-content pre { font-size: 14px; }
    }
  </style>
</head>
<body>

<header class="header">
  <h1>AI 工程师面试题 <span class="badge">RELX · LexisNexis</span></h1>
  <p>法律 AI · LLM 应用 · RAG · Agent · 英文表达 · 团队管理</p>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-num">0</div><div class="stat-label">总题数</div></div>
    <div class="stat done"><div class="stat-num" id="done-num">0</div><div class="stat-label">已掌握</div></div>
    <div class="stat review"><div class="stat-num" id="review-num">0</div><div class="stat-label">需复习</div></div>
  </div>
</header>

<div class="toolbar">
  <input class="search" id="search" placeholder="🔍 搜索题目或关键词,如 RAG、Agent、self introduction..." />
  <nav class="categories" id="categories"></nav>
</div>

<main id="content"></main>

<button class="top-btn" id="topBtn" title="回到顶部">↑</button>

<script>
/* ============================================================
   字段说明：
   - cat: 分类
   - q: 题目
   - tags: ['must'|'nice'|'hot'|'code'|'en']
   - core: 核心要点
   - detail: 详细展开（支持 HTML）
   - bonus: 加分回答
   - pitfall: 容易踩坑
============================================================ */
const QUESTIONS = [

  /* ============ A. 英文自我介绍 ============ */
  {
    cat: 'A. 英文自我介绍',
    q: 'Tell me about yourself / Self introduction (90 秒版本)',
    tags: ['must','hot','en'],
    core: '套用 <strong>Present → Past → Future</strong> 三段式：现在做什么 → 过去关键经历 → 为什么对这个岗位感兴趣。',
    detail: `
      <p><em>模板（背熟,可灵活调整）：</em></p>
      <blockquote>
        "Hi, I am Rachel. I'm currently working as an <strong>AI Full-Stack Engineer</strong>,
        focusing on building <strong>LLM-powered applications</strong> end-to-end —
        from data pipelines and RAG retrieval to product-facing APIs and front-end integration.<br><br>

        Before that, I spent several years in <strong>e-commerce and travel platforms</strong>,
        leading backend services with NestJS / Python in high-concurrency environments.
        That gave me a solid foundation in <strong>distributed systems, microservices, and AWS cloud</strong>.<br><br>

        Over the past two years, I shifted my focus to <strong>applied AI</strong> —
        I've delivered production RAG systems, AI search,
        and dialogue engines used by real business users.
        I really enjoy turning <strong>raw LLM capabilities into reliable, measurable products</strong>.<br><br>

        That's why <strong>RELX / LexisNexis</strong> excites me —
        you are pioneering <strong>legal AI at scale</strong>, with Lexis+ AI redefining
        how lawyers interact with knowledge. I'd love to bring my full-stack + AI experience
        to your team and contribute to that mission."
      </blockquote>
      <p><strong>结构拆解：</strong></p>
      <ul>
        <li><strong>1️⃣ Present (现在)</strong>: 当前职位 + 核心技术栈 + 最近做什么</li>
        <li><strong>2️⃣ Past (过去)</strong>: 关键经历 + 沉淀的能力（不是流水账）</li>
        <li><strong>3️⃣ Future (未来)</strong>: 为什么是这家公司 + 我能带来什么</li>
      </ul>
    `,
    bonus: '提到 RELX 旗下具体产品（<em>Lexis+ AI、Westlaw Edge 类比</em>）会显得做过功课。准备一个 30 秒短版用于电话筛选,90 秒标准版用于正式面试。',
    pitfall: '不要背稿子的腔调,适当停顿、用 "for example..." 加入细节。避免说 "I am a hardworking person" 这类空话。'
  },
  {
    cat: 'A. 英文自我介绍',
    q: 'Walk me through your resume / Walk me through your career path',
    tags: ['must','en'],
    core: '不是逐条念简历,而是讲<strong>「故事线」</strong>：每一段职业的<em>核心成就</em>和<em>能力跃迁</em>,以及为什么换工作。',
    detail: `
      <p><em>话术模板：</em></p>
      <blockquote>
        "Sure, let me walk you through the highlights.<br><br>
        I started my career as a <strong>full-stack engineer</strong> at [Company X], where I built [product] from scratch.
        The key takeaway from that role was learning how to ship end-to-end —
        from database schema design to React components.<br><br>

        Then I moved to [Company Y] as a <strong>senior backend engineer</strong>,
        leading the [order/payment/etc.] system serving millions of daily requests.
        That's where I got deep into <strong>microservices, distributed transactions, and observability</strong>.<br><br>

        About two years ago, I started spending more and more time on <strong>AI integration</strong> —
        first as a side project, then it became my main focus.
        At [Current Company], I now lead AI-powered features including [your AI project highlight].<br><br>

        Looking forward, I want to focus 100% on <strong>building AI products that matter</strong>,
        which is why this role at RELX is exciting."
      </blockquote>
      <ul>
        <li>每段强调 <strong>1 个核心成就 + 1 个能力跃迁</strong>(STAR 提炼)</li>
        <li>切换工作的理由要 <strong>positive</strong>(成长 / 新挑战 / 业务匹配),不抱怨前东家</li>
        <li>总时长 2-3 分钟,语速比平时慢 10%</li>
      </ul>
    `,
    bonus: '准备 <strong>关键数字</strong>:QPS、用户数、降本比例、模型评测分数等。一两个具体数据可以瞬间拉高可信度。'
  },
  {
    cat: 'A. 英文自我介绍',
    q: 'Why are you interested in RELX / LexisNexis?',
    tags: ['must','hot','en'],
    core: '三层结构：<strong>对公司的认知 → 对岗位的匹配 → 个人价值观共鸣</strong>。',
    detail: `
      <p><em>话术模板：</em></p>
      <blockquote>
        "Three reasons.<br><br>

        <strong>First, the domain.</strong> Legal tech is one of the few fields where AI can have
        an <em>immediate, measurable impact</em>. Lawyers spend hours on research and drafting —
        AI can give that time back. I find that genuinely meaningful.<br><br>

        <strong>Second, the technical depth.</strong> RELX has been investing in
        <em>retrieval and knowledge systems</em> for decades. Building AI on top of
        the world's largest legal corpus is a much harder and more interesting problem
        than wrapping a generic chatbot.<br><br>

        <strong>Third, the responsibility.</strong> Legal AI demands <em>accuracy, traceability,
        and trust</em> — hallucinations can have real consequences.
        I appreciate that LexisNexis takes citations and grounding seriously,
        and that aligns with how I approach AI engineering."
      </blockquote>
      <p><strong>展示对 RELX 的了解（可提前查的关键词）：</strong></p>
      <ul>
        <li><strong>Lexis+ AI</strong> — 旗舰法律 AI 产品(基于 RAG + LLM)</li>
        <li><strong>LexisNexis</strong> — 法律 / 监管 / 风险数据库</li>
        <li><strong>Elsevier</strong> — 学术出版,ScienceDirect、Scopus</li>
        <li><strong>Reed Exhibitions</strong> — 会展业务</li>
        <li>RELX 核心定位:<em>"information-based analytics and decision tools"</em></li>
      </ul>
    `,
    bonus: '提到 <strong>"Responsible AI"</strong>、<strong>"Grounded generation"</strong> 这类关键词,RELX 在 AI 治理方向有公开的原则文档,提前查一下分数会很高。'
  },
  {
    cat: 'A. 英文自我介绍',
    q: '介绍一个你最得意的项目 (Most proud project)',
    tags: ['must','en'],
    core: '用 <strong>STAR</strong> 框架(Situation, Task, Action, Result),重点突出<em>个人贡献</em>和<em>量化结果</em>。',
    detail: `
      <p><em>话术框架：</em></p>
      <ul>
        <li><strong>S — Situation</strong>: "We had a problem where [业务痛点]..."</li>
        <li><strong>T — Task</strong>: "My responsibility was to [我的角色]..."</li>
        <li><strong>A — Action</strong>: "I designed [技术方案],
          made the key decision to [关键决策]
          because [理由]..."</li>
        <li><strong>R — Result</strong>: "As a result, we [量化结果 — 降低 X%、节省 Y 小时、月活提升 Z]"</li>
      </ul>
      <p><em>RAG 项目示例：</em></p>
      <blockquote>
        "We had hundreds of internal policy documents and customer support was wasting hours per day searching them.
        I led the design of an internal <strong>RAG-based Q&A system</strong>.<br><br>

        The key decisions were:
        <strong>(1)</strong> use hybrid retrieval — BGE-M3 dense vectors plus BM25 — for both semantic and keyword recall;
        <strong>(2)</strong> add a bge-reranker stage to cut down from 20 candidates to 3,
        which reduced LLM token cost by 70%;
        <strong>(3)</strong> enforce citation grounding in the prompt so every answer
        included source page numbers.<br><br>

        Result: <strong>average response time dropped from 5 minutes (manual search)
        to 8 seconds, with 91% answer accuracy</strong> measured by our review team."

# 迭代解法 — 时间 O(n), 空间 O(1)
def reverse_iter(head):
    prev, curr = None, head
    while curr:
        nxt = curr.next        # 暂存下一个
        curr.next = prev       # 翻转指针
        prev = curr            # 前移 prev

# 递归解法 — 时间 O(n), 空间 O(n)
def reverse_recur(head):

    head.next.next = head

      <pre><code># 0/1 背包：n 件物品，容量 W，每件取 0 或 1 次
def knapsack(weights, values, W):
    n = len(weights)
    # dp[i][w] = 前 i 件物品，容量 w 时的最大价值
    dp = [[0] * (W + 1) for _ in range(n + 1)]
    for i in range(1, n + 1):
        for w in range(W + 1):
            if w >= weights[i-1]:
                dp[i][w] = max(
                    dp[i-1][w],                              # 不选
                    dp[i-1][w-weights[i-1]] + values[i-1]    # 选
                )
            else:
                dp[i][w] = dp[i-1][w]
    return dp[n][W]

# 滚动数组优化：空间从 O(nW) 降到 O(W)
def knapsack_opt(weights, values, W):
    dp = [0] * (W + 1)
    for i in range(len(weights)):
        for w in range(W, weights[i] - 1, -1):  # 倒序避免重复使用
            dp[w] = max(dp[w], dp[w-weights[i]] + values[i])
    return dp[W]</code></pre>

const STORAGE_KEY = 'relx-iv-progress-v1';
const progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

const tagLabel = { must: '必考', nice: '加分', hot: '热门', code: '手写', en: '英文' };

function categoriesList() {
  const map = new Map();
  QUESTIONS.forEach(q => map.set(q.cat, (map.get(q.cat) || 0) + 1));
  return Array.from(map.entries());
}

let activeCat = 'all';
let keyword = '';

function render() {
  const cats = categoriesList();
  const total = QUESTIONS.length;
  const doneCount = Object.values(progress).filter(v => v === 'done').length;
  const reviewCount = Object.values(progress).filter(v => v === 'review').length;
  document.getElementById('total-num').textContent = total;
  document.getElementById('done-num').textContent = doneCount;
  document.getElementById('review-num').textContent = reviewCount;

  const navEl = document.getElementById('categories');
  navEl.innerHTML = '';
  const allBtn = createCatBtn('all', '全部', total);
  navEl.appendChild(allBtn);
  cats.forEach(([cat, count]) => navEl.appendChild(createCatBtn(cat, cat, count)));

  const filtered = QUESTIONS
    .map((q, i) => ({ ...q, idx: i }))
    .filter(q => (activeCat === 'all' || q.cat === activeCat))
    .filter(q => {
      if (!keyword) return true;
      const k = keyword.toLowerCase();
      return q.q.toLowerCase().includes(k)
        || q.cat.toLowerCase().includes(k)
        || (q.core || '').toLowerCase().includes(k)
        || (q.detail || '').toLowerCase().includes(k);
    });

  const content = document.getElementById('content');
  content.innerHTML = '';

  if (filtered.length === 0) {
    const catLabel = activeCat === 'all' ? '所有分类' : activeCat;
    if (keyword) {
      content.innerHTML = `
        <div class="empty">
          <div class="empty-title">在「${catLabel}」中没有匹配「${keyword}」的题目 🔍</div>
          <div class="empty-hint">试试切换到「全部」或换个关键词</div>
          <button class="clear-search-btn" id="clearSearchBtn">清除搜索</button>
        </div>`;
      document.getElementById('clearSearchBtn').onclick = () => {
        keyword = '';
        document.getElementById('search').value = '';
        render();
      };
    } else {
      content.innerHTML = '<div class="empty"><div class="empty-title">该分类下暂无题目</div></div>';
    }
    return;
  }

  let currentGroup = '';
  filtered.forEach((q) => {
    if (q.cat !== currentGroup) {
      currentGroup = q.cat;
      const title = document.createElement('div');
      const isEn = /^[A-E]\./.test(q.cat);
      title.className = 'group-title' + (isEn ? ' en' : '');
      title.textContent = q.cat;
      content.appendChild(title);
    }
    content.appendChild(buildCard(q));
  });
}

function createCatBtn(key, label, count) {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (activeCat === key ? ' active' : '');
  btn.innerHTML = label + '<span class="count">' + count + '</span>';
  btn.onclick = () => {
    activeCat = key;
    keyword = '';
    document.getElementById('search').value = '';
    render();
    window.scrollTo({top: 0, behavior:'smooth'});
  };
  return btn;
}

function buildCard(q) {
  const card = document.createElement('div');
  const state = progress[q.idx];
  card.className = 'qcard' + (state === 'done' ? ' done' : '');

  const tagsHtml = (q.tags || []).map(t =>
    `<span class="tag ${t}">${tagLabel[t] || t}</span>`).join('');

  card.innerHTML = `
    <div class="q-head">
      <div class="q-num">${String(q.idx + 1).padStart(2, '0')}</div>
      <div class="q-title-wrap">
        <div class="q-title">${q.q}</div>
        <div class="q-tags">${tagsHtml}</div>
      </div>
      <div class="q-icon">▸</div>
    </div>
    <div class="q-body">
      ${q.core ? `<div class="ans-block">
        <div class="ans-label">💡 核心要点</div>
        <div class="ans-content">${q.core}</div>
      </div>` : ''}
      ${q.detail ? `<div class="ans-block">
        <div class="ans-label">📖 详细展开</div>
        <div class="ans-content">${q.detail}</div>
      </div>` : ''}
      ${q.bonus ? `<div class="ans-block">
        <div class="ans-label bonus">⭐ 加分回答</div>
        <div class="ans-content">${q.bonus}</div>
      </div>` : ''}
      ${q.pitfall ? `<div class="ans-block">
        <div class="ans-label pitfall">⚠️ 容易踩坑</div>
        <div class="ans-content">${q.pitfall}</div>
      </div>` : ''}
      <div class="action-row">
        <button class="action-btn ${state === 'done' ? 'done' : ''}" data-action="done" data-idx="${q.idx}">
          ${state === 'done' ? '✓ 已掌握' : '标记已掌握'}
        </button>
        <button class="action-btn ${state === 'review' ? 'review' : ''}" data-action="review" data-idx="${q.idx}">
          ${state === 'review' ? '◷ 待复习' : '标记待复习'}
        </button>
        <button class="action-btn" data-action="reset" data-idx="${q.idx}">清除</button>
      </div>
    </div>
  `;

  card.querySelector('.q-head').onclick = () => card.classList.toggle('expanded');

  card.querySelectorAll('.action-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const idx = btn.dataset.idx;
      const action = btn.dataset.action;
      if (action === 'reset') delete progress[idx];
      else progress[idx] = action;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      render();
    };
  });

  return card;
}

document.getElementById('search').addEventListener('input', e => {
  keyword = e.target.value.trim();
  render();
});

const topBtn = document.getElementById('topBtn');
window.addEventListener('scroll', () => {
  topBtn.classList.toggle('show', window.scrollY > 400);
});
topBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

render();
</script>
</body>
</html>
